<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Focus Agent</title>

    <style>
        /* ==================================================
           DESIGN TOKENS
           Change these 6 values and the whole theme updates.
           ================================================== */
        :root {
            --bg: #0f1013;
            /* main background — near-black, not pure blue-black */
            --panel: #17191f;
            /* header / input bar background */
            --panel-alt: #1d2029;
            /* assistant bubble background */
            --border: #262a34;
            --text: #edeef2;
            --text-dim: #8b93a1;
            --accent: #7c6cf0;
            /* violet — the agent's "voice" */
            --accent-2: #35d0c0;
            /* teal — used sparingly for the live tab chip */
        }

        /* ==================================================
           RESET
           ================================================== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            width: 380px;
            height: 560px;
            /* Chrome extension popups don't resize on their own,
               so we pick a fixed size that fits a chat layout */
            font-family: -apple-system, "Segoe UI", system-ui, sans-serif;
            background: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* ==================================================
           1. HEADER
           Agent identity + a live status dot, like the top
           bar of ChatGPT / Claude / Cursor's chat panel.
           ================================================== */
        header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 12px 14px;
            background: var(--panel);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .agent-id {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* A small mark instead of a stock robot emoji — keeps it
           looking like a designed product rather than a template */
        .agent-mark {
            width: 22px;
            height: 22px;
            border-radius: 7px;
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
            flex-shrink: 0;
        }

        .agent-name {
            font-size: 13px;
            font-weight: 600;
        }

        .agent-status {
            font-size: 10.5px;
            color: var(--text-dim);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--accent-2);
            box-shadow: 0 0 0 0 rgba(53, 208, 192, 0.5);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            70% {
                box-shadow: 0 0 0 5px rgba(53, 208, 192, 0);
            }
        }

        .icon-btn {
            width: 26px;
            height: 26px;
            border-radius: 6px;
            border: none;
            background: transparent;
            color: var(--text-dim);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: var(--panel-alt);
            color: var(--text);
        }

        /* ==================================================
           2. CONTEXT CHIP
           Shows the tab the agent is "looking at" right now —
           this is the signature element. It's what makes the
           popup feel like it understands your browser, not
           just a chat box floating in space.
           ================================================== */
        .context-bar {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            background: var(--bg);
            border-bottom: 1px solid var(--border);
            flex-shrink: 0;
        }

        .context-chip {
            display: flex;
            align-items: center;
            gap: 6px;
            max-width: 100%;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--panel-alt);
            border: 1px solid var(--border);
            font-size: 11px;
            color: var(--text-dim);
            overflow: hidden;
        }

        .context-chip .dot {
            width: 5px;
            height: 5px;
            border-radius: 50%;
            background: var(--accent-2);
            flex-shrink: 0;
        }

        .context-chip span.site {
            color: var(--text);
            font-weight: 600;
            font-family: ui-monospace, "SF Mono", Menlo, monospace;
        }

        .context-chip .page {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* ==================================================
           3. CHAT THREAD
           ================================================== */
        .chat {
            flex: 1;
            overflow-y: auto;
            padding: 14px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .chat::-webkit-scrollbar {
            width: 6px;
        }

        .chat::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 3px;
        }

        .msg {
            display: flex;
            gap: 8px;
            max-width: 90%;
            animation: rise 0.25s ease-out;
        }

        @keyframes rise {
            from {
                opacity: 0;
                transform: translateY(6px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .msg.agent {
            align-self: flex-start;
        }

        .msg.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        .msg-mark {
            width: 20px;
            height: 20px;
            border-radius: 6px;
            flex-shrink: 0;
            margin-top: 2px;
        }

        .msg.agent .msg-mark {
            background: linear-gradient(135deg, var(--accent), var(--accent-2));
        }

        .msg.user .msg-mark {
            background: var(--panel-alt);
            border: 1px solid var(--border);
        }

        .bubble {
            font-size: 13px;
            line-height: 1.45;
            padding: 9px 12px;
            border-radius: 12px;
        }

        .msg.agent .bubble {
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-top-left-radius: 4px;
        }

        .msg.user .bubble {
            background: var(--accent);
            color: #fff;
            border-top-right-radius: 4px;
        }

        /* ==================================================
           4. QUICK ACTIONS
           Suggested prompts, like ChatGPT's starter chips or
           Notion AI's slash menu — lets a first-time user act
           without having to think of what to type.
           ================================================== */
        .quick-actions {
            display: flex;
            gap: 6px;
            padding: 0 14px 10px;
            flex-shrink: 0;
            overflow-x: auto;
        }

        .chip-btn {
            flex-shrink: 0;
            font-size: 11.5px;
            padding: 6px 11px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--panel-alt);
            color: var(--text);
            cursor: pointer;
            white-space: nowrap;
        }

        .chip-btn:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        /* ==================================================
           5. INPUT BAR
           ================================================== */
        .input-bar {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            padding: 10px 14px 14px;
            background: var(--panel);
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        #chatInput {
            flex: 1;
            resize: none;
            max-height: 90px;
            font-family: inherit;
            font-size: 13px;
            line-height: 1.4;
            color: var(--text);
            background: var(--panel-alt);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 9px 11px;
            outline: none;
        }

        #chatInput:focus {
            border-color: var(--accent);
        }

        #sendBtn {
            width: 34px;
            height: 34px;
            border-radius: 9px;
            border: none;
            background: var(--accent);
            color: #fff;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        #sendBtn:hover {
            filter: brightness(1.08);
        }

        #sendBtn:disabled {
            opacity: 0.4;
            cursor: default;
        }

        @media (prefers-reduced-motion: reduce) {

            .status-dot,
            .msg {
                animation: none;
            }
        }
    </style>
</head>

<body>

    <!-- 1. HEADER -->
    <header>
        <div class="agent-id">
            <div class="agent-mark"></div>
            <div>
                <div class="agent-name">Focus Agent</div>
                <div class="agent-status"><span class="status-dot"></span><span id="backendStatus">Connected</span>
                </div>
            </div>
        </div>
        <button class="icon-btn" title="Settings">⚙</button>
    </header>

    <!-- 2. LIVE TAB CONTEXT -->
    <div class="context-bar">
        <div class="context-chip">
            <span class="dot"></span>
            <span class="site" id="contextSite">example.com</span>
            <span class="page" id="contextPage">— Loading tab…</span>
        </div>
    </div>

    <!-- 3. CHAT THREAD -->
    <div class="chat" id="chatMessages">
        <div class="msg agent">
            <div class="msg-mark"></div>
            <div class="bubble">
                Hey! I'm watching this tab. Want a summary, or should I flag it as a distraction?
            </div>
        </div>
    </div>

    <!-- 4. QUICK ACTIONS -->
    <div class="quick-actions">
        <button class="chip-btn" data-prompt="Summarize this page">Summarize page</button>
        <button class="chip-btn" data-prompt="Block this site for 30 minutes">Block site 30m</button>
        <button class="chip-btn" data-prompt="Start a focus session">Start focus</button>
    </div>

    <!-- 5. INPUT BAR -->
    <div class="input-bar">
        <textarea id="chatInput" rows="1" placeholder="Ask Focus Agent…"></textarea>
        <button id="sendBtn" title="Send">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
                <path d="M4 12L20 4L13 20L11 13L4 12Z" stroke="currentColor" stroke-width="2" stroke-linejoin="round" />
            </svg>
        </button>
    </div>

    <script src="popup.js"></script>

</body>

</html>
